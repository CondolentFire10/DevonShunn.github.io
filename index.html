<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Devon Shunn Portfolio</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: black;
    color: white;
    overflow-x: hidden;
}

/* =========================================================
   🎥 VIDEO BACKGROUND (NO JS CONTROL)
========================================================= */
#bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    object-fit: cover;
    z-index: -2;

    /* helps performance */
    transform: translateZ(0);
}

/* lighter overlay (you asked earlier) */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;

    /* MUCH lighter than before */
    background: rgba(0,0,0,0.2);

    z-index: -1;
}

/* =========================================================
   SECTIONS
========================================================= */
.section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
}

.card {
    max-width: 900px;
    width: 100%;
    background: rgba(20,20,20,0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(12px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);

    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 1.2s ease forwards;
}

.section:nth-child(1) .card { animation-delay: 0.1s; }
.section:nth-child(2) .card { animation-delay: 0.2s; }
.section:nth-child(3) .card { animation-delay: 0.3s; }
.section:nth-child(4) .card { animation-delay: 0.4s; }
.section:nth-child(5) .card { animation-delay: 0.5s; }

@keyframes fadeIn {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* text */
h1 { font-size: 3rem; margin-bottom: 10px; }
h2 { font-size: 2rem; margin-bottom: 15px; }

p {
    font-size: 1.1rem;
    line-height: 1.6;
    opacity: 0.9;
}

ul {
    margin-top: 15px;
    padding-left: 20px;
}

li {
    margin-bottom: 8px;
}
</style>
</head>

<body>

<!-- =========================================================
   🎥 VIDEO (SIMPLE LOOP — NO CONTROL)
========================================================= -->
<video
    id="bgVideo"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
>
    <source src="./background.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- CONTENT -->
<div class="section"><div class="card"><h1>Hi, I’m Devon Shunn</h1></div></div>
<div class="section"><div class="card"><h2>About</h2></div></div>
<div class="section"><div class="card"><h2>Skills</h2></div></div>
<div class="section"><div class="card"><h2>Projects</h2></div></div>
<div class="section"><div class="card"><h2>Contact</h2></div></div>

</body>
</html>
