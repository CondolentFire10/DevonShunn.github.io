<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Devon Shunn Portfolio</title>

<link rel="icon" type="image/png" href="favicon.png">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: black;
    color: white;
    overflow-x: hidden;
}

/* =========================================================
   🎥 CANVAS BACKGROUND (FIXES VIDEO JANK)
========================================================= */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    z-index: -2;
}

/* overlay (lighter like you wanted) */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: rgba(0,0,0,0.25);
    z-index: -1;
}

/* sections */
.section {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 20px;
}

.card {
    max-width: 900px;
    width: 100%;
    background: rgba(20,20,20,0.7);
    border-radius: 20px;
    padding: 40px;
    backdrop-filter: blur(12px);

    opacity: 0;
    transform: translateY(30px);
    animation: fadeIn 1.2s ease forwards;
}

@keyframes fadeIn {
    to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div class="overlay"></div>

<!-- CONTENT -->
<div class="section"><div class="card"><h1>Devon Shunn</h1></div></div>
<div class="section"><div class="card"><h2>About</h2></div></div>
<div class="section"><div class="card"><h2>Skills</h2></div></div>
<div class="section"><div class="card"><h2>Projects</h2></div></div>
<div class="section"><div class="card"><h2>Contact</h2></div></div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

const video = document.createElement("video");
video.src = "background.mp4";
video.muted = true;
video.playsInline = true;
video.preload = "auto";
video.loop = false;

let width, height;

function resize(){
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* smooth scroll driver */
let target = 0;
let current = 0;

video.addEventListener("loadedmetadata", () => {

    function loop(){

        const scrollTop = window.scrollY;
        const maxScroll = document.body.scrollHeight - window.innerHeight;

        const progress = Math.min(1, scrollTop / maxScroll);

        target = progress * video.duration;

        /* smooth interpolation */
        current += (target - current) * 0.12;

        video.currentTime = current;

        draw();

        requestAnimationFrame(loop);
    }

    function draw(){
        if (!video.videoWidth) return;

        ctx.clearRect(0,0,width,height);

        const scale = Math.max(
            width / video.videoWidth,
            height / video.videoHeight
        );

        const x = (width - video.videoWidth * scale)/2;
        const y = (height - video.videoHeight * scale)/2;

        ctx.drawImage(video, x, y,
            video.videoWidth * scale,
            video.videoHeight * scale
        );
    }

    loop();
});
</script>

</body>
</html>
